<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#e8538f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Silvella">
<title>SILVELLA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p50:#fff0f6;--p100:#ffe0ee;--p200:#ffc1dd;--p300:#ff94c0;
  --p400:#f472a8;--p500:#e8538f;--p600:#c93670;
  --rose:#e8a4b8;--blush:#f9d4e1;--cream:#fdf8f9;
  --dark:#1a0a10;--gray:#8a6070;
  --fd:'Cormorant Garamond',serif;--fb:'Jost',sans-serif;
  --sh:0 4px 24px rgba(200,80,120,.08);
  --sc:0 8px 32px rgba(200,80,120,.12);
  --sv:0 16px 48px rgba(200,80,120,.2);
  --r:16px;--rs:8px;--tr:all .3s cubic-bezier(.4,0,.2,1)
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--cream);color:var(--dark);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--p50)}::-webkit-scrollbar-thumb{background:var(--p300);border-radius:2px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scaleIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes petals{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse2{0%,100%{box-shadow:0 4px 20px rgba(228,83,143,.4)}50%{box-shadow:0 4px 32px rgba(228,83,143,.7)}}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(253,248,249,.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(232,164,184,.2);transition:var(--tr)}
.nav.scrolled{padding:12px 20px;box-shadow:var(--sh)}
.nav-brand{font-family:var(--fd);font-size:26px;font-weight:500;letter-spacing:5px;background:linear-gradient(135deg,var(--p500),var(--p300));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;user-select:none}
.nav-actions{display:flex;gap:8px;align-items:center}
.nav-btn{background:none;border:none;cursor:pointer;padding:8px;border-radius:50%;color:var(--gray);transition:var(--tr);position:relative;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:var(--p100);color:var(--p500)}
.cart-badge{position:absolute;top:2px;right:2px;background:var(--p500);color:#fff;font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#fff5f8 0%,#fce8f0 40%,#f9d4e1 70%,#f5c1d4 100%)}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(244,114,168,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(232,164,184,.2) 0%,transparent 50%)}
.hero-content{text-align:center;z-index:1;padding:24px;animation:fadeInUp 1.2s cubic-bezier(.4,0,.2,1) both}
.hero-eye{font-size:11px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:var(--p400);margin-bottom:20px;animation:fadeInUp 1s .2s both;display:block}
.hero-title{font-family:var(--fd);font-size:clamp(68px,14vw,138px);font-weight:300;line-height:.9;letter-spacing:8px;background:linear-gradient(135deg,var(--p600) 0%,var(--p400) 50%,var(--rose) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeInUp 1s .4s both;display:block}
.hero-sub{font-family:var(--fd);font-size:clamp(14px,3vw,20px);font-weight:300;font-style:italic;color:var(--p400);letter-spacing:2px;margin-top:16px;animation:fadeInUp 1s .6s both;display:block}
.hero-cta{margin-top:40px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;animation:fadeInUp 1s .8s both}
.scroll-ind{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);animation:float 2s ease-in-out infinite;color:var(--p400);font-size:24px;cursor:pointer;z-index:2}
.petal{position:absolute;border-radius:50% 0 50% 0;animation:petals linear infinite;pointer-events:none;background:var(--p300)}
/* BUTTONS */
.btn-primary{padding:13px 32px;background:linear-gradient(135deg,var(--p500),var(--p400));color:#fff;border:none;border-radius:50px;font-family:var(--fb);font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:var(--tr);box-shadow:0 4px 20px rgba(228,83,143,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(228,83,143,.4)}
.btn-secondary{padding:13px 32px;background:transparent;color:var(--p500);border:1.5px solid var(--p300);border-radius:50px;font-family:var(--fb);font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:var(--tr)}
.btn-secondary:hover{background:var(--p50);transform:translateY(-2px)}
/* SECTION */
.section{padding:64px 20px;max-width:1100px;margin:0 auto}
.sec-head{text-align:center;margin-bottom:44px}
.sec-tag{font-size:11px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:var(--p400);margin-bottom:10px;display:block}
.sec-title{font-family:var(--fd);font-size:clamp(30px,5vw,50px);font-weight:400;color:var(--dark);letter-spacing:2px}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--p200),transparent)}
/* CATEGORIES */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:800px;margin:0 auto}
@media(max-width:400px){.cat-grid{gap:10px}}
.cat-card{border-radius:var(--r);cursor:pointer;aspect-ratio:1;background:var(--cream);box-shadow:var(--sc);transition:var(--tr);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border:1.5px solid rgba(255,193,221,.3)}
.cat-card:hover,.cat-card:active{transform:translateY(-4px) scale(1.02);box-shadow:var(--sv);border-color:var(--p200)}
.cat-icon{font-size:38px;animation:float 3s ease-in-out infinite;display:block}
.cat-name{font-family:var(--fd);font-size:20px;font-weight:500;color:var(--dark);letter-spacing:2px}
.cat-count{font-size:12px;color:var(--gray);letter-spacing:1px}
/* PRODUCTS */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
@media(max-width:520px){.prod-grid{grid-template-columns:repeat(2,1fr);gap:10px}}
.prod-card{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:var(--tr)}
.prod-card:hover{transform:translateY(-4px);box-shadow:var(--sv)}
.prod-img-wrap{position:relative;overflow:hidden;aspect-ratio:1}
.prod-img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.4,0,.2,1);display:block}
.prod-card:hover .prod-img{transform:scale(1.08)}
.prod-badge{position:absolute;top:10px;left:10px;background:linear-gradient(135deg,var(--p500),var(--p400));color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:50px}
.prod-info{padding:14px}
.prod-name{font-family:var(--fd);font-size:16px;font-weight:500;color:var(--dark);margin-bottom:7px;line-height:1.3}
.prod-prices{display:flex;align-items:center;gap:8px}
.prod-price{font-size:15px;font-weight:700;color:var(--p500)}
.prod-old{font-size:12px;color:var(--gray);text-decoration:line-through}
.prod-stock{font-size:11px;color:var(--p400);margin-top:5px}
.prod-add{width:100%;margin-top:10px;padding:9px;background:linear-gradient(135deg,var(--p100),var(--blush));border:1.5px solid var(--p200);color:var(--p600);border-radius:var(--rs);font-family:var(--fb);font-size:12px;font-weight:500;cursor:pointer;transition:var(--tr)}
.prod-add:hover,.prod-add:active{background:linear-gradient(135deg,var(--p500),var(--p400));color:#fff;border-color:transparent}
/* SKELETON */
.skel{background:linear-gradient(90deg,var(--p50) 25%,var(--blush) 50%,var(--p50) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--rs)}
.skel-card{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.skel-img{width:100%;aspect-ratio:1}
.skel-info{padding:14px;display:flex;flex-direction:column;gap:8px}
.skel-line{height:13px}.skel-line.s{width:55%}.skel-line.m{width:80%}
/* PROD HEADER */
.prod-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.back-btn{background:none;border:none;cursor:pointer;color:var(--gray);font-size:13px;display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:var(--rs);font-family:var(--fb);transition:var(--tr)}
.back-btn:hover{background:var(--p50);color:var(--p500)}
.filter-chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:5px 13px;background:#fff;border:1.5px solid var(--p100);color:var(--gray);border-radius:50px;font-size:11px;font-weight:500;cursor:pointer;transition:var(--tr);font-family:var(--fb)}
.chip.active{background:linear-gradient(135deg,var(--p500),var(--p400));color:#fff;border-color:transparent}
/* OVERLAY */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(20,5,12,.5);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;padding:16px;animation:fadeIn .3s both}
@media(min-width:580px){.overlay{align-items:center}}
/* CHAT */
.chat-modal{background:#fff;border-radius:24px;width:100%;max-width:400px;max-height:78vh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .4s cubic-bezier(.34,1.56,.64,1) both;box-shadow:0 24px 80px rgba(200,80,120,.25)}
.chat-hdr{padding:18px 18px 14px;background:linear-gradient(135deg,var(--p500),var(--p400));display:flex;align-items:center;justify-content:space-between}
.chat-av{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:18px}
.chat-nm{color:#fff;font-weight:600;font-size:14px}.chat-st{color:rgba(255,255,255,.8);font-size:11px}
.chat-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;background:var(--p50)}
.bubble{max-width:82%;padding:11px 15px;border-radius:18px;font-size:13px;line-height:1.55;animation:scaleIn .3s cubic-bezier(.34,1.56,.64,1) both}
.bubble.bot{background:#fff;color:var(--dark);border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(200,80,120,.08);align-self:flex-start}
.bubble.user{background:linear-gradient(135deg,var(--p500),var(--p400));color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.typing{display:flex;gap:4px;align-items:center;padding:11px 15px;background:#fff;border-radius:18px;border-bottom-left-radius:4px;align-self:flex-start;box-shadow:0 2px 8px rgba(200,80,120,.08)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--p400);animation:typing 1s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.1s}.dot:nth-child(3){animation-delay:.2s}
.chat-opts{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.opt-btn{padding:7px 15px;background:#fff;border:1.5px solid var(--p200);color:var(--p600);border-radius:50px;font-family:var(--fb);font-size:12px;font-weight:500;cursor:pointer;transition:var(--tr)}
.opt-btn:hover,.opt-btn.sel{background:linear-gradient(135deg,var(--p500),var(--p400));color:#fff;border-color:transparent}
/* CART */
.cart-drawer{position:fixed;top:0;right:0;bottom:0;z-index:300;width:min(380px,100vw);background:#fff;box-shadow:-8px 0 40px rgba(200,80,120,.15);display:flex;flex-direction:column;animation:slideIn .35s cubic-bezier(.4,0,.2,1) both}
.cart-hdr{padding:22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--p100)}
.cart-title{font-family:var(--fd);font-size:22px;font-weight:500;letter-spacing:2px}
.cart-items{flex:1;overflow-y:auto;padding:14px 20px}
.cart-item{display:flex;gap:11px;align-items:center;padding:11px 0;border-bottom:1px solid var(--p50)}
.cart-img{width:60px;height:60px;border-radius:var(--rs);object-fit:cover}
.ci-info{flex:1}
.ci-name{font-family:var(--fd);font-size:14px;font-weight:500;line-height:1.3}
.ci-price{font-size:13px;color:var(--p500);margin-top:3px;font-weight:600}
.ci-qty{display:flex;align-items:center;gap:7px;margin-top:7px}
.qty-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--p200);background:none;color:var(--p500);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.qty-btn:hover{background:var(--p100)}
.qty-n{font-size:13px;font-weight:600;min-width:18px;text-align:center}
.cart-rm{background:none;border:none;cursor:pointer;color:var(--gray);font-size:17px;padding:4px}
.cart-empty{text-align:center;padding:60px 20px;color:var(--gray)}
.cart-footer{padding:18px 20px;border-top:1px solid var(--p100)}
.cart-total{display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-bottom:14px}
.cart-total-amt{color:var(--p500)}
/* ORDER */
.order-modal{background:#fff;border-radius:24px;width:100%;max-width:420px;animation:scaleIn .4s cubic-bezier(.34,1.56,.64,1) both;overflow:hidden;max-height:92vh;overflow-y:auto}
.order-hdr{padding:22px;background:linear-gradient(135deg,var(--p50),var(--blush));border-bottom:1px solid var(--p100)}
.order-title{font-family:var(--fd);font-size:26px;font-weight:400;letter-spacing:2px;color:var(--dark)}
.order-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.form-grp{display:flex;flex-direction:column;gap:6px}
.form-lbl{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--gray)}
.form-inp{padding:11px 15px;background:var(--p50);border:1.5px solid var(--p100);border-radius:var(--rs);font-family:var(--fb);font-size:13px;color:var(--dark);outline:none;transition:var(--tr);width:100%}
.form-inp:focus{border-color:var(--p300);background:#fff;box-shadow:0 0 0 4px rgba(244,114,168,.1)}
.wa-btn{padding:13px 22px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:none;border-radius:var(--rs);font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;transition:var(--tr)}
.wa-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,211,102,.3)}
/* TOASTS */
.toast-wrap{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:7px;align-items:center;pointer-events:none;width:100%;padding:0 20px}
.toast{background:var(--dark);color:#fff;padding:11px 20px;border-radius:50px;font-size:12px;font-weight:500;animation:toastIn .3s both;box-shadow:0 8px 24px rgba(0,0,0,.2);white-space:nowrap;max-width:300px;text-align:center}
.toast.ok{background:linear-gradient(135deg,#25D366,#128C7E)}
.toast.err{background:linear-gradient(135deg,#e85353,#c93636)}
.toast.inf{background:linear-gradient(135deg,var(--p500),var(--p400))}
/* BOT */
.bot-fab{position:fixed;bottom:24px;right:20px;z-index:400;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--p500),var(--p400));border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:var(--tr);animation:pulse2 2s infinite;color:#fff}
.bot-fab:hover{transform:scale(1.1)}
.bot-win{position:fixed;bottom:88px;right:16px;z-index:400;width:min(340px,calc(100vw - 32px));height:450px;background:#fff;border-radius:20px;box-shadow:0 16px 60px rgba(200,80,120,.25);display:flex;flex-direction:column;overflow:hidden;animation:scaleIn .3s cubic-bezier(.34,1.56,.64,1) both;transform-origin:bottom right}
.bot-hdr{padding:14px 18px;background:linear-gradient(135deg,var(--p500),var(--p400));display:flex;align-items:center;justify-content:space-between}
.bot-title{color:#fff;font-weight:700;font-size:14px}.bot-sub{color:rgba(255,255,255,.8);font-size:11px}
.bot-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;background:var(--p50)}
.bot-inp-wrap{padding:10px 14px;border-top:1px solid var(--p100);display:flex;gap:7px}
.bot-inp{flex:1;padding:9px 13px;background:var(--p50);border:1.5px solid var(--p100);border-radius:50px;font-family:var(--fb);font-size:12px;outline:none;transition:var(--tr)}
.bot-inp:focus{border-color:var(--p300);background:#fff}
.bot-send{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--p500),var(--p400));border:none;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
/* FOOTER */
footer{background:var(--dark);padding:44px 20px;text-align:center}
.footer-logo{font-family:var(--fd);font-size:30px;letter-spacing:7px;background:linear-gradient(135deg,var(--p300),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.footer-by{font-size:15px;color:rgba(255,255,255,.75);margin-bottom:5px;letter-spacing:1px}
.footer-prod{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:20px}
.footer-line{height:1px;background:linear-gradient(90deg,transparent,rgba(232,164,184,.3),transparent);max-width:140px;margin:0 auto 16px}
.footer-copy{font-size:11px;color:rgba(255,255,255,.28);letter-spacing:1px}
/* ADMIN */
.admin-wrap{min-height:100vh;background:linear-gradient(135deg,var(--cream),var(--p50))}
.admin-sb{position:fixed;left:0;top:0;bottom:0;width:230px;background:#fff;box-shadow:4px 0 20px rgba(200,80,120,.08);padding:28px 0;display:flex;flex-direction:column;z-index:10}
@media(max-width:768px){.admin-sb{display:none}.admin-main{margin-left:0!important;padding:16px 14px 80px!important}}
.admin-logo{padding:0 22px 28px;font-family:var(--fd);font-size:22px;font-weight:500;letter-spacing:4px;background:linear-gradient(135deg,var(--p500),var(--p400));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.admin-ni{padding:11px 22px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:var(--tr);font-size:13px;color:var(--gray);border-left:3px solid transparent}
.admin-ni:hover,.admin-ni.on{background:var(--p50);color:var(--p500);border-left-color:var(--p400)}
.admin-main{margin-left:230px;padding:28px}
.admin-card{background:#fff;border-radius:var(--r);padding:22px;box-shadow:var(--sh)}
.stat-icon{width:52px;height:52px;border-radius:var(--r);background:linear-gradient(135deg,var(--p100),var(--blush));display:flex;align-items:center;justify-content:center;font-size:22px}
.stat-num{font-family:var(--fd);font-size:34px;font-weight:500;color:var(--p500)}
.stat-lbl{font-size:12px;color:var(--gray);letter-spacing:1px;margin-top:2px}
.tbl{width:100%;border-collapse:collapse;margin-top:14px}
.tbl th{padding:11px 14px;text-align:right;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);border-bottom:1px solid var(--p100)}
.tbl td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--p50)}
.tbl tr:hover td{background:var(--p50)}
.tbl img{width:44px;height:44px;border-radius:7px;object-fit:cover}
.tag-pill{display:inline-block;padding:2px 9px;border-radius:50px;font-size:10px;font-weight:600}
.tag-perfumes{background:#fce8f5;color:#c93670}.tag-skincare{background:#e8f5fc;color:#1a8fc9}
.tag-makeup{background:#fcf3e8;color:#c96b19}.tag-offers{background:#e8fce8;color:#19a819}
/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fff5f8,#f5c1d4);padding:20px}
.login-card{background:#fff;border-radius:24px;padding:36px;width:100%;max-width:380px;box-shadow:0 24px 80px rgba(200,80,120,.2);animation:scaleIn .4s both}
.login-logo{font-family:var(--fd);font-size:40px;font-weight:300;letter-spacing:8px;text-align:center;background:linear-gradient(135deg,var(--p600),var(--p400));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
/* MOBILE ADMIN BAR */
.mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;background:#fff;border-top:1px solid var(--p100);padding:6px 0}
@media(max-width:768px){.mob-bar{display:flex;justify-content:space-around}}
.mob-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--gray);cursor:pointer;padding:5px 10px;border-radius:var(--rs);transition:var(--tr);font-family:var(--fb)}
.mob-btn.on{color:var(--p500)}.mob-btn span:first-child{font-size:19px}
.overlay-bg{position:fixed;inset:0;z-index:299}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══ DATABASE (localStorage) ═══════════════════════════════════════════════
const DB={
  get:k=>{try{return JSON.parse(localStorage.getItem('sv_'+k))}catch{return null}},
  set:(k,v)=>localStorage.setItem('sv_'+k,JSON.stringify(v))
};
function init(){
  if(!DB.get('products'))DB.set('products',[]); // starts empty — you add your own
  DB.set('visitors',(DB.get('visitors')||0)+1);
  if(!DB.get('admin'))DB.set('admin',{email:'silvia@silvella.com',password:'Silvella2024!'});
}

// ═══ STATE ═════════════════════════════════════════════════════════════════
let S={
  page:location.hash==='#admin'?'admin':'home',
  products:[],cart:[],
  cartOpen:false,chatOpen:false,orderOpen:false,botOpen:false,
  currentCat:null,priceFilter:null,loading:true,
  adminAuthed:false,adminView:'dashboard',addOpen:false,editProd:null,
  toasts:[],
  botMsgs:[{role:'assistant',content:'أهلاً بك في Silvella! ✨ أنا مساعدتك الذكية. كيف يمكنني مساعدتك اليوم؟ 🌸'}],
  botLoading:false,botInput:'',
  loginForm:{email:'',password:''},loginError:'',
  orderForm:{name:'',phone:'',address:''},
  prodForm:{name:'',price:'',oldPrice:'',category:'perfumes',stock:'',image:''},
};
let _tid=0;
function toast(msg,type='inf'){
  const id=++_tid;
  S.toasts=[...S.toasts,{id,msg,type}];render();
  setTimeout(()=>{S.toasts=S.toasts.filter(t=>t.id!==id);render();},3000);
}
function set(u){S={...S,...u};render();}

// ═══ AI BOT ═════════════════════════════════════════════════════════════════
async function askAI(msgs){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,
        system:'أنتِ مساعدة ذكاء اصطناعي لمتجر Silvella للعطور ومستحضرات التجميل الفاخرة. اسم صاحبة المتجر سيلفيا. المنتجات: عطور، عناية بالبشرة، مكياج، عروض. ردي باللغة العربية بأسلوب أنيق وودي ومختصر.',
        messages:msgs})
    });
    const d=await r.json();
    return d.content?.[0]?.text||'عذراً، حدث خطأ 💕';
  }catch{
    return['بالطبع! منتجاتنا في Silvella مختارة بعناية 🌸','يسعدني مساعدتك! ما الفئة التي تهتمين بها؟ ✨','Silvella تقدم أجمل العطور والمستحضرات الفاخرة 💄'][Math.floor(Math.random()*3)];
  }
}
async function sendBot(){
  const t=S.botInput.trim();if(!t||S.botLoading)return;
  const nm=[...S.botMsgs,{role:'user',content:t}];
  set({botMsgs:nm,botInput:'',botLoading:true});scrollBot();
  const rep=await askAI(nm.map(m=>({role:m.role,content:m.content})));
  set({botMsgs:[...nm,{role:'assistant',content:rep}],botLoading:false});scrollBot();
}
function scrollBot(){setTimeout(()=>{const e=document.getElementById('bm');if(e)e.scrollTop=e.scrollHeight;},60);}

// ═══ CART ═══════════════════════════════════════════════════════════════════
function addToCart(p){
  let c=[...S.cart],ex=c.find(i=>i.id===p.id);
  if(ex)c=c.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i);else c=[...c,{...p,qty:1}];
  set({cart:c});toast(p.name+' أُضيف للسلة 🛍️','ok');
}
function updQ(id,d){set({cart:S.cart.map(i=>i.id===id?{...i,qty:Math.max(0,i.qty+d)}:i).filter(i=>i.qty>0)});}
const total=()=>S.cart.reduce((s,i)=>s+i.price*i.qty,0);
const count=()=>S.cart.reduce((s,i)=>s+i.qty,0);

// ═══ WHATSAPP ════════════════════════════════════════════════════════════════
function sendWA(){
  const f=S.orderForm;
  if(!f.name||!f.phone||!f.address){toast('أكملي جميع البيانات','err');return;}
  const items=S.cart.map(i=>`• ${i.name} × ${i.qty} = ${i.price*i.qty} جنيه`).join('\n');
  const msg=`🌹 *طلب جديد من Silvella*\n\n👤 الاسم: ${f.name}\n📞 الهاتف: ${f.phone}\n📍 العنوان: ${f.address}\n\n*المنتجات:*\n${items}\n\n💰 *الإجمالي: ${total()} جنيه*\n\nشكراً لثقتك في Silvella ✨`;
  window.open('https://wa.me/201068213723?text='+encodeURIComponent(msg),'_blank');
  set({cart:[],orderOpen:false,orderForm:{name:'',phone:'',address:''}});
  toast('تم إرسال طلبك! 🎉','ok');
}

// ═══ ADMIN PRODUCTS ══════════════════════════════════════════════════════════
function delProd(id){
  if(!confirm('هل تريدين حذف هذا المنتج؟'))return;
  const p=S.products.filter(x=>x.id!==id);DB.set('products',p);set({products:p});toast('تم الحذف','ok');
}
function saveProd(p){
  let products=S.editProd?S.products.map(x=>x.id===p.id?p:x):[...S.products,{...p,id:'p'+Date.now()}];
  DB.set('products',products);
  set({products,addOpen:false,editProd:null,prodForm:{name:'',price:'',oldPrice:'',category:'perfumes',stock:'',image:''}});
  toast(S.editProd?'تم التحديث ✓':'تم الإضافة ✓','ok');
}

// ═══ RENDER ══════════════════════════════════════════════════════════════════
function render(){
  const root=document.getElementById('root');if(!root)return;
  root.innerHTML=S.page==='admin'?(S.adminAuthed?rAdmin():rLogin()):rApp();
  attachEv();
}

// ─ APP ───────────────────────────────────────────────────────────────────────
function rApp(){
  const fp=S.products.filter(p=>{
    if(S.currentCat&&p.category!==S.currentCat)return false;
    if(S.priceFilter&&p.price>S.priceFilter)return false;
    return true;
  });
  const cn={perfumes:'عطور',skincare:'عناية بالبشرة',makeup:'مكياج',offers:'عروض خاصة'};
  return`
<nav class="nav" id="nav">
  <span class="nav-brand" onclick="goTop()">SILVELLA</span>
  <div class="nav-actions">
    <button class="nav-btn" onclick="set({cartOpen:true})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      ${count()>0?`<span class="cart-badge">${count()}</span>`:''}
    </button>
  </div>
</nav>

<section class="hero">
  <div class="hero-bg"></div>
  ${petals()}
  <div class="hero-content">
    <span class="hero-eye">✦ The Art of Luxury Beauty ✦</span>
    <span class="hero-title">SILVELLA</span>
    <span class="hero-sub">Crafted for the Modern Woman</span>
    <div class="hero-cta">
      <button class="btn-primary" onclick="goCats()">تسوقي الآن</button>
      <button class="btn-secondary" onclick="set({botOpen:true})">اسألي مساعدتنا ✨</button>
    </div>
  </div>
  <div class="scroll-ind" onclick="goCats()">↓</div>
</section>

<div class="divider"></div>

<div class="section" id="cats">
  <div class="sec-head">
    <span class="sec-tag">✦ Collections</span>
    <h2 class="sec-title">تسوقي بالفئة</h2>
  </div>
  <div class="cat-grid">
    ${[{id:'perfumes',name:'عطور',icon:'🌹'},{id:'skincare',name:'العناية بالبشرة',icon:'💎'},{id:'makeup',name:'مكياج',icon:'💄'},{id:'offers',name:'عروض',icon:'🎁'}].map(c=>`
    <div class="cat-card" onclick="pickCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>
      <span class="cat-name">${c.name}</span>
      <span class="cat-count">${S.products.filter(p=>p.category===c.id).length} منتج</span>
    </div>`).join('')}
  </div>
</div>

<div class="section" id="prods">
  ${S.currentCat?`
  <div class="prod-head">
    <button class="back-btn" onclick="set({currentCat:null,priceFilter:null})">← رجوع</button>
    ${S.currentCat==='perfumes'?`<div class="filter-chips">${[50,125,150,220].map(p=>`<button class="chip${S.priceFilter===p?' active':''}" onclick="togF(${p})">${p} جنيه</button>`).join('')}</div>`:''}</div>`:''}
  <div class="sec-head">
    <span class="sec-tag">✦ Products</span>
    <h2 class="sec-title">${S.currentCat?cn[S.currentCat]:'منتجاتنا المميزة'}</h2>
  </div>
  ${S.loading?skels():fp.length===0?`
  <div style="text-align:center;padding:80px 20px">
    <div style="font-size:56px;margin-bottom:16px">🌸</div>
    <p style="font-family:var(--fd);font-size:22px;color:var(--p400);margin-bottom:8px">لا توجد منتجات بعد</p>
    <p style="font-size:13px;color:var(--gray)">سيتم إضافة المنتجات قريباً</p>
  </div>`:`<div class="prod-grid">${fp.map((p,i)=>rProd(p,i)).join('')}</div>`}
</div>

<footer>
  <div class="footer-logo">SILVELLA</div>
  <div class="footer-by">Silvella by Silvia</div>
  <div class="footer-prod">Produced by Evratech</div>
  <div class="footer-line"></div>
  <div class="footer-copy">© 2024 Silvella — All Rights Reserved</div>
</footer>

${S.chatOpen?`
<div class="overlay" onclick="closeChat()">
  <div class="chat-modal" onclick="event.stopPropagation()">
    <div class="chat-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="chat-av">🌹</div>
        <div><div class="chat-nm">Silvella Beauty</div><div class="chat-st">● متاحة الآن</div></div>
      </div>
      <button class="chat-close" onclick="closeChat()">✕</button>
    </div>
    <div class="chat-msgs">
      <div class="bubble bot">اهلا بحضرتك 👋</div>
      <div class="bubble bot">حضرتك عايزة عطور في حدود كام؟ 🌸</div>
      <div style="align-self:flex-start"><div class="chat-opts">
        ${[50,125,150,220].map(p=>`<button class="opt-btn${S.priceFilter===p?' sel':''}" onclick="pickP(${p})">${p} جنيه</button>`).join('')}
      </div></div>
    </div>
  </div>
</div>`:''}

${S.cartOpen?`
<div class="overlay-bg" style="background:rgba(0,0,0,.3);backdrop-filter:blur(4px)" onclick="set({cartOpen:false})"></div>
<div class="cart-drawer">
  <div class="cart-hdr">
    <span class="cart-title">سلتك 🛍️</span>
    <button class="nav-btn" onclick="set({cartOpen:false})">✕</button>
  </div>
  ${S.cart.length===0?`<div class="cart-empty"><div style="font-size:48px;margin-bottom:14px">🛒</div><p>سلتك فارغة</p><p style="font-size:12px;margin-top:7px;color:var(--gray)">ابدأي التسوق الآن!</p></div>`:`
  <div class="cart-items">${S.cart.map(i=>`
    <div class="cart-item">
      <img src="${i.image}" alt="${i.name}" class="cart-img" loading="lazy">
      <div class="ci-info">
        <div class="ci-name">${i.name}</div>
        <div class="ci-price">${i.price} جنيه</div>
        <div class="ci-qty">
          <button class="qty-btn" onclick="updQ('${i.id}',-1)">−</button>
          <span class="qty-n">${i.qty}</span>
          <button class="qty-btn" onclick="updQ('${i.id}',1)">+</button>
        </div>
      </div>
      <button class="cart-rm" onclick="set({cart:S.cart.filter(x=>x.id!=='${i.id}')})">🗑</button>
    </div>`).join('')}</div>
  <div class="cart-footer">
    <div class="cart-total"><span>الإجمالي</span><span class="cart-total-amt">${total()} جنيه</span></div>
    <button class="btn-primary" style="width:100%" onclick="set({cartOpen:false,orderOpen:true})">اطلبي الآن 🌹</button>
  </div>`}
</div>`:''}

${S.orderOpen?`
<div class="overlay" onclick="set({orderOpen:false})">
  <div class="order-modal" onclick="event.stopPropagation()">
    <div class="order-hdr">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2 class="order-title">أكملي طلبك 🌹</h2>
        <button class="nav-btn" onclick="set({orderOpen:false})">✕</button>
      </div>
      <p style="font-size:12px;color:var(--gray);margin-top:7px">سيُرسَل طلبك عبر واتساب مباشرة</p>
    </div>
    <div class="order-body">
      <div class="form-grp"><label class="form-lbl">الاسم</label><input class="form-inp" placeholder="اسمك الكريم" value="${S.orderForm.name}" oninput="S.orderForm.name=this.value"></div>
      <div class="form-grp"><label class="form-lbl">رقم الهاتف</label><input class="form-inp" type="tel" placeholder="01xxxxxxxxx" value="${S.orderForm.phone}" oninput="S.orderForm.phone=this.value"></div>
      <div class="form-grp"><label class="form-lbl">العنوان</label><input class="form-inp" placeholder="المحافظة، المنطقة، الشارع" value="${S.orderForm.address}" oninput="S.orderForm.address=this.value"></div>
      <div style="background:var(--p50);border-radius:var(--rs);padding:14px">
        <div style="font-size:12px;color:var(--gray);margin-bottom:8px;font-weight:600">ملخص الطلب:</div>
        ${S.cart.map(i=>`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>${i.name} ×${i.qty}</span><span style="color:var(--p500);font-weight:700">${i.price*i.qty} جنيه</span></div>`).join('')}
        <div style="display:flex;justify-content:space-between;font-weight:800;margin-top:10px;padding-top:10px;border-top:1px solid var(--p200)"><span>الإجمالي</span><span style="color:var(--p500)">${total()} جنيه</span></div>
      </div>
      <button class="wa-btn" onclick="sendWA()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        أرسلي الطلب عبر واتساب
      </button>
    </div>
  </div>
</div>`:''}

${S.botOpen?`
<div class="bot-win">
  <div class="bot-hdr">
    <div><div class="bot-title">Silvella AI ✨</div><div class="bot-sub">مساعدتك الذكية دائماً هنا</div></div>
    <button class="chat-close" onclick="set({botOpen:false})">✕</button>
  </div>
  <div class="bot-msgs" id="bm">
    ${S.botMsgs.map(m=>`<div class="bubble ${m.role==='user'?'user':'bot'}">${m.content}</div>`).join('')}
    ${S.botLoading?`<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`:''}
  </div>
  <div class="bot-inp-wrap">
    <input class="bot-inp" id="bi" placeholder="اكتبي سؤالك..." value="${S.botInput}"
      oninput="S.botInput=this.value" onkeydown="if(event.key==='Enter')sendBot()">
    <button class="bot-send" onclick="sendBot()">➤</button>
  </div>
</div>`:''}

<button class="bot-fab" onclick="set({botOpen:!S.botOpen})">${S.botOpen?'✕':'✨'}</button>

<div class="toast-wrap">${S.toasts.map(t=>`<div class="toast ${t.type}">${t.msg}</div>`).join('')}</div>`;
}

// ─ PRODUCT CARD ───────────────────────────────────────────────────────────
function rProd(p,i){
  const d=p.oldPrice?Math.round((1-p.price/p.oldPrice)*100):null;
  return`<div class="prod-card" style="animation:fadeInUp .5s ${i*.07}s both">
  <div class="prod-img-wrap">
    <img src="${p.image||'https://via.placeholder.com/300x300/ffc1dd/c93670?text='+encodeURIComponent(p.name)}" alt="${p.name}" class="prod-img" loading="lazy"
      onerror="this.src='https://via.placeholder.com/300x300/ffc1dd/c93670?text=🌸'">
    ${d?`<span class="prod-badge">−${d}%</span>`:''}
  </div>
  <div class="prod-info">
    <div class="prod-name">${p.name}</div>
    <div class="prod-prices">
      <span class="prod-price">${p.price} جنيه</span>
      ${p.oldPrice?`<span class="prod-old">${p.oldPrice} جنيه</span>`:''}
    </div>
    ${p.stock<=5?`<div class="prod-stock">⚠️ ${p.stock} قطع متبقية فقط</div>`:''}
    <button class="prod-add" onclick='addToCart(${JSON.stringify(p)})'>أضيفي للسلة +</button>
  </div>
</div>`;
}
function skels(){return`<div class="prod-grid">${Array(4).fill(0).map(()=>`<div class="skel-card"><div class="skel skel-img"></div><div class="skel-info"><div class="skel skel-line m"></div><div class="skel skel-line s"></div></div></div>`).join('')}</div>`;}
function petals(){return Array(10).fill(0).map(()=>{const l=Math.random()*100,d=5+Math.random()*8,dl=Math.random()*5,s=6+Math.random()*10;return`<div class="petal" style="left:${l}%;top:-20px;animation-duration:${d}s;animation-delay:${dl}s;width:${s}px;height:${s}px;opacity:${.3+Math.random()*.5}"></div>`;}).join('');}

// ─ ADMIN ─────────────────────────────────────────────────────────────────
function rAdmin(){
  const ps=S.products,vis=DB.get('visitors')||1;
  const catL={perfumes:'🌹 عطور',skincare:'💎 بشرة',makeup:'💄 مكياج',offers:'🎁 عروض'};
  return`
<div class="admin-wrap">
<div class="admin-sb">
  <div class="admin-logo">SILVELLA</div>
  ${[{id:'dashboard',l:'لوحة التحكم',i:'📊'},{id:'products',l:'المنتجات',i:'🛍️'}].map(x=>`
  <div class="admin-ni${S.adminView===x.id?' on':''}" onclick="set({adminView:'${x.id}'})">${x.i} ${x.l}</div>`).join('')}
  <div class="admin-ni" onclick="openAdd()">➕ إضافة منتج</div>
  <div style="margin-top:auto">
    <div class="admin-ni" onclick="goHome()">🏠 الموقع</div>
    <div class="admin-ni" onclick="set({adminAuthed:false})">🚪 خروج</div>
  </div>
</div>
<div class="admin-main">
  ${S.adminView==='dashboard'?`
  <h2 style="font-family:var(--fd);font-size:26px;margin-bottom:20px">أهلاً سيلفيا 🌹</h2>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px">
    ${[{i:'👁️',n:vis,l:'الزوار'},{i:'📦',n:ps.length,l:'المنتجات'},{i:'⚠️',n:ps.filter(p=>p.stock<=5).length,l:'مخزون منخفض'},{i:'🎁',n:ps.filter(p=>p.oldPrice).length,l:'عروض'}].map(s=>`
    <div class="admin-card"><div style="display:flex;align-items:center;gap:12px"><div class="stat-icon">${s.i}</div><div><div class="stat-num">${s.n}</div><div class="stat-lbl">${s.l}</div></div></div></div>`).join('')}
  </div>
  <div class="admin-card" style="margin-top:18px">
    <div style="font-family:var(--fd);font-size:20px;margin-bottom:14px">إجراءات سريعة</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn-primary" onclick="openAdd()">+ إضافة منتج</button>
      <button class="btn-secondary" onclick="set({adminView:'products'})">عرض المنتجات</button>
    </div>
  </div>`:`
  <div class="admin-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px">
      <h2 style="font-family:var(--fd);font-size:22px">المنتجات (${ps.length})</h2>
      <button class="btn-primary" style="padding:9px 18px;font-size:12px" onclick="openAdd()">+ إضافة</button>
    </div>
    ${ps.length===0?`<div style="text-align:center;padding:40px;color:var(--gray)"><div style="font-size:40px;margin-bottom:12px">📦</div><p>لا توجد منتجات بعد</p><p style="font-size:12px;margin-top:6px">اضغطي "+ إضافة" لإضافة أول منتج</p></div>`:`
    <div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>صورة</th><th>الاسم</th><th>الفئة</th><th>السعر</th><th>المخزون</th><th>إجراءات</th></tr></thead>
      <tbody>${ps.map(p=>`
      <tr>
        <td><img src="${p.image||'https://via.placeholder.com/44x44/ffc1dd/c93670?text=S'}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/44x44/ffc1dd/c93670?text=S'"></td>
        <td style="font-family:var(--fd);font-weight:500">${p.name}</td>
        <td><span class="tag-pill tag-${p.category}">${catL[p.category]}</span></td>
        <td style="color:var(--p500);font-weight:700">${p.price} جنيه${p.oldPrice?`<br><span style="color:var(--gray);font-size:11px;text-decoration:line-through">${p.oldPrice}</span>`:''}</td>
        <td style="color:${p.stock<=5?'var(--p500)':'var(--gray)'}">${p.stock<=5?'⚠️ ':''} ${p.stock}</td>
        <td><div style="display:flex;gap:6px;flex-wrap:wrap">
          <button style="padding:5px 11px;font-size:11px;background:var(--p50);border:1.5px solid var(--p200);color:var(--p600);border-radius:50px;cursor:pointer" onclick='editP(${JSON.stringify(p)})'>✏️ تعديل</button>
          <button style="padding:5px 11px;font-size:11px;background:#fff0f0;border:1.5px solid #ffc1c1;color:#c93636;border-radius:50px;cursor:pointer" onclick="delProd('${p.id}')">🗑 حذف</button>
        </div></td>
      </tr>`).join('')}
      </tbody>
    </table></div>`}
  </div>`}
</div>

<!-- Mobile bar -->
<div class="mob-bar">
  <button class="mob-btn${S.adminView==='dashboard'?' on':''}" onclick="set({adminView:'dashboard'})"><span>📊</span><span>الرئيسية</span></button>
  <button class="mob-btn${S.adminView==='products'?' on':''}" onclick="set({adminView:'products'})"><span>🛍️</span><span>المنتجات</span></button>
  <button class="mob-btn" onclick="openAdd()"><span>➕</span><span>إضافة</span></button>
  <button class="mob-btn" onclick="goHome()"><span>🏠</span><span>الموقع</span></button>
</div>
</div>

${S.addOpen?`
<div class="overlay" onclick="closeAdd()">
  <div class="order-modal" style="max-height:93vh;overflow-y:auto" onclick="event.stopPropagation()">
    <div class="order-hdr">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2 class="order-title">${S.editProd?'✏️ تعديل منتج':'➕ منتج جديد'}</h2>
        <button class="nav-btn" onclick="closeAdd()">✕</button>
      </div>
    </div>
    <div class="order-body">
      <div class="form-grp"><label class="form-lbl">اسم المنتج *</label>
        <input class="form-inp" placeholder="مثال: Rose Oud Elixir" value="${S.prodForm.name}" oninput="S.prodForm.name=this.value"></div>
      <div class="form-grp"><label class="form-lbl">السعر (جنيه) *</label>
        <input class="form-inp" type="number" placeholder="150" value="${S.prodForm.price}" oninput="S.prodForm.price=this.value"></div>
      <div class="form-grp"><label class="form-lbl">السعر القديم — للعروض (اختياري)</label>
        <input class="form-inp" type="number" placeholder="200" value="${S.prodForm.oldPrice}" oninput="S.prodForm.oldPrice=this.value"></div>
      <div class="form-grp"><label class="form-lbl">الكمية المتاحة *</label>
        <input class="form-inp" type="number" placeholder="10" value="${S.prodForm.stock}" oninput="S.prodForm.stock=this.value"></div>
      <div class="form-grp"><label class="form-lbl">رابط صورة المنتج</label>
        <input class="form-inp" placeholder="https://..." value="${S.prodForm.image}" oninput="S.prodForm.image=this.value">
        <span style="font-size:11px;color:var(--gray)">💡 ارفع الصورة على imgbb.com ثم انسخ الرابط هنا</span></div>
      <div class="form-grp"><label class="form-lbl">الفئة *</label>
        <select class="form-inp" onchange="S.prodForm.category=this.value">
          ${['perfumes','skincare','makeup','offers'].map(c=>`<option value="${c}"${S.prodForm.category===c?' selected':''}>${{perfumes:'🌹 عطور',skincare:'💎 عناية بالبشرة',makeup:'💄 مكياج',offers:'🎁 عروض'}[c]}</option>`).join('')}
        </select></div>
      <button class="btn-primary" style="width:100%" onclick="subProd()">
        ${S.editProd?'💾 حفظ التعديلات':'✅ إضافة المنتج'}
      </button>
    </div>
  </div>
</div>`:''}

<div class="toast-wrap">${S.toasts.map(t=>`<div class="toast ${t.type}">${t.msg}</div>`).join('')}</div>`;
}

// ─ LOGIN ──────────────────────────────────────────────────────────────────
function rLogin(){return`
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">SILVELLA</div>
    <p style="text-align:center;color:var(--gray);font-size:12px;margin-bottom:28px;letter-spacing:3px">ADMIN PANEL</p>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="form-grp"><label class="form-lbl">البريد الإلكتروني</label>
        <input class="form-inp" type="email" placeholder="silvia@silvella.com" value="${S.loginForm.email}" oninput="S.loginForm.email=this.value"></div>
      <div class="form-grp"><label class="form-lbl">كلمة المرور</label>
        <input class="form-inp" type="password" placeholder="••••••••" value="${S.loginForm.password}"
          oninput="S.loginForm.password=this.value" onkeydown="if(event.key==='Enter')doLogin()"></div>
      ${S.loginError?`<p style="color:var(--p500);font-size:12px;text-align:center">${S.loginError}</p>`:''}
      <button class="btn-primary" style="width:100%;margin-top:6px" onclick="doLogin()">دخول 🌹</button>
      <div style="background:var(--p50);border-radius:var(--rs);padding:12px;text-align:center">
        <p style="font-size:11px;color:var(--gray);line-height:2.2">📧 silvia@silvella.com<br>🔑 Silvella2024!</p>
      </div>
    </div>
  </div>
  <div class="toast-wrap">${S.toasts.map(t=>`<div class="toast ${t.type}">${t.msg}</div>`).join('')}</div>
</div>`;}

// ═══ HELPERS ═════════════════════════════════════════════════════════════════
window.goTop=()=>{set({currentCat:null,priceFilter:null,chatOpen:false});window.scrollTo({top:0,behavior:'smooth'});};
window.goCats=()=>document.getElementById('cats')?.scrollIntoView({behavior:'smooth'});
window.pickCat=(id)=>{set({currentCat:id,priceFilter:null});if(id==='perfumes')set({chatOpen:true});else setTimeout(()=>document.getElementById('prods')?.scrollIntoView({behavior:'smooth'}),100);};
window.closeChat=()=>{set({chatOpen:false});setTimeout(()=>document.getElementById('prods')?.scrollIntoView({behavior:'smooth'}),100);};
window.pickP=(p)=>{set({priceFilter:S.priceFilter===p?null:p,chatOpen:false});setTimeout(()=>document.getElementById('prods')?.scrollIntoView({behavior:'smooth'}),100);toast(`عطور حتى ${p} جنيه 🌹`,'inf');};
window.togF=(p)=>set({priceFilter:S.priceFilter===p?null:p});
window.doLogin=()=>{
  const a=DB.get('admin')||{email:'silvia@silvella.com',password:'Silvella2024!'};
  if(S.loginForm.email===a.email&&S.loginForm.password===a.password){set({adminAuthed:true,loginError:''});toast('مرحباً سيلفيا! 🌹','ok');}
  else set({loginError:'بيانات غير صحيحة ❌'});
};
window.goHome=()=>{set({page:'home'});location.hash='';};
window.openAdd=()=>set({addOpen:true,editProd:null,prodForm:{name:'',price:'',oldPrice:'',category:'perfumes',stock:'',image:''}});
window.closeAdd=()=>set({addOpen:false,editProd:null});
window.editP=(p)=>set({editProd:p,addOpen:true,prodForm:{name:p.name,price:p.price,oldPrice:p.oldPrice||'',category:p.category,stock:p.stock,image:p.image||''}});
window.subProd=()=>{
  const f=S.prodForm;
  if(!f.name||!f.price||!f.stock){toast('أكملي الحقول المطلوبة *','err');return;}
  const p={...(S.editProd||{}),name:f.name.trim(),price:Number(f.price),oldPrice:f.oldPrice?Number(f.oldPrice):null,stock:Number(f.stock),category:f.category,image:f.image.trim()||'',badge:f.oldPrice?'offer':null};
  saveProd(p);
};

function attachEv(){
  window.onscroll=()=>{const n=document.getElementById('nav');if(n){if(scrollY>60)n.classList.add('scrolled');else n.classList.remove('scrolled');}};
  scrollBot();
}
window.onhashchange=()=>{if(location.hash==='#admin')set({page:'admin'});else set({page:'home'});};

// ═══ START ════════════════════════════════════════════════════════════════════
init();
S.products=DB.get('products')||[];
render();
setTimeout(()=>set({loading:false}),800);
</script>
</body>
</html>
